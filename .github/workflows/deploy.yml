name: Build & Push to Azure Container Registry

on:
  push:
    branches:
      - main
      - develop

env:
  REGISTRY_URL: ${{ secrets.AZURE_REGISTRY_URL }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ env.REGISTRY_URL }}/asha-backend:${{ github.sha }},${{ env.REGISTRY_URL }}/asha-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY_URL }}/asha-frontend:${{ github.sha }},${{ env.REGISTRY_URL }}/asha-frontend:latest
