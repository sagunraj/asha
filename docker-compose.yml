services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: asha_db
      POSTGRES_USER: asha_user
      POSTGRES_PASSWORD: asha_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asha_user -d asha_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DEBUG: "True"
      SECRET_KEY: "your-secret-key-for-dev"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: asha_db
      DB_USER: asha_user
      DB_PASSWORD: asha_password
      DB_HOST: db
      DB_PORT: 5432
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
