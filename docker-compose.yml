services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: asha_db
      POSTGRES_USER: asha_user
      POSTGRES_PASSWORD: asha_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asha_user -d asha_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: "postgresql://asha_user:asha_password@db:5432/asha_db"
      SECRET_KEY: "dev-secret-key-change-in-production-32chars!!"
      CORS_ORIGINS: "http://localhost:3000"
      EMAIL_BACKEND: "console"
      ADMIN_EMAIL: "admin@kpals.org"
      ADMIN_PASSWORD: "AshaDonor@2024"
      OTP_EXPIRY_MINUTES: "10"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
